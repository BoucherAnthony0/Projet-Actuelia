name: CI S3
on: [push, pull_request]
jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dépendances
        run: pip install -r requirements.txt
      - name: Compilation
        run: python -m compileall config.py app.py ingest_cv.py db core tests
      - name: Suite de tests
        run: pytest -q
      - name: Test base de données (historique)
        run: python tests/test_db.py
